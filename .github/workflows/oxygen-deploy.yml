name: Storefront — Oxygen Deployment
on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Oxygen
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Deploy to Oxygen
        run: npx shopify hydrogen deploy --no-verify --token "$SHOPIFY_HYDROGEN_FLAG_TOKEN" --storefront-id "1000127135"
        env:
          SHOPIFY_HYDROGEN_FLAG_TOKEN: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN }}
          SHOPIFY_FLAG_STORE: 0gk4tx-0x.myshopify.com
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.PUBLIC_STOREFRONT_API_TOKEN }}
          PUBLIC_STORE_DOMAIN: ${{ secrets.PUBLIC_STORE_DOMAIN }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
